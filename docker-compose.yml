services:

  # ─── PHP-FPM ───────────────────────────────────────────────
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: ${PHP_CONTAINER_NAME:-yii-link-php}
    restart: ${PHP_RESTART_POLICY:-unless-stopped}
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-yii_link}
      DB_CHARSET: ${DB_CHARSET:-utf8mb4}
      DB_DSN: ${DB_DSN:-mysql:host=${DB_HOST:-mysql};port=${DB_PORT:-3306};dbname=${DB_NAME:-yii_link};charset=${DB_CHARSET:-utf8mb4}}
      DB_USER: ${DB_USER:-yii_link}
      DB_PASS: ${DB_PASS:-yii_link_secret}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_EXPIRE: ${JWT_EXPIRE:-86400}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - yii-link

  # ─── Nginx ─────────────────────────────────────────────────
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: ${NGINX_CONTAINER_NAME:-yii-link-nginx}
    restart: ${NGINX_RESTART_POLICY:-unless-stopped}
    ports:
      - "${NGINX_HTTP_PORT:-8000}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - php
    networks:
      - yii-link

  # ─── MySQL ─────────────────────────────────────────────────
  mysql:
    build:
      context: ./docker/mysql
      dockerfile: Dockerfile
    container_name: ${MYSQL_CONTAINER_NAME:-yii-link-mysql}
    restart: ${MYSQL_RESTART_POLICY:-unless-stopped}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${DB_NAME:-yii_link}
      MYSQL_USER: ${DB_USER:-yii_link}
      MYSQL_PASSWORD: ${DB_PASS:-yii_link_secret}
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "${DB_USER:-yii_link}",
          "-p${DB_PASS:-yii_link_secret}",
        ]
      interval: ${MYSQL_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${MYSQL_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${MYSQL_HEALTHCHECK_RETRIES:-5}
      start_period: ${MYSQL_HEALTHCHECK_START_PERIOD:-30s}
    networks:
      - yii-link

  # ─── Redis（可选缓存）──────────────────────────────────────
  redis:
    build:
      context: ./docker/redis
      dockerfile: Dockerfile
    container_name: ${REDIS_CONTAINER_NAME:-yii-link-redis}
    restart: ${REDIS_RESTART_POLICY:-unless-stopped}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./docker/redis/data:/data
    networks:
      - yii-link

networks:
  yii-link:
    driver: bridge
