services:

  # ─── PHP-FPM ───────────────────────────────────────────────
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: yii-link-php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      DB_DSN: "mysql:host=mysql;dbname=yii_link;charset=utf8mb4"
      DB_USER: yii_link
      DB_PASS: yii_link_secret
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_EXPIRE: "86400"
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - yii-link

  # ─── 数据库迁移（一次性任务）──────────────────────────────────
  migrate:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: yii-link-migrate
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      DB_DSN: "mysql:host=mysql;dbname=yii_link;charset=utf8mb4"
      DB_USER: yii_link
      DB_PASS: yii_link_secret
    command: php vendor/bin/yii-db-migration migrate/up --no-interaction
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - yii-link
    restart: "no"

  # ─── Nginx ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: yii-link-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - yii-link

  # ─── MySQL ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: yii-link-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: yii_link
      MYSQL_USER: yii_link
      MYSQL_PASSWORD: yii_link_secret
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/conf/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "yii_link", "-pyii_link_secret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - yii-link

  # ─── Redis（可选缓存）──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: yii-link-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis/data:/data
    command: redis-server --appendonly yes
    networks:
      - yii-link

networks:
  yii-link:
    driver: bridge
